<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Premier Motors — new and certified pre-owned vehicles, financing, trade-ins, and full-service maintenance." />
    <title>Premier Motors | New & Used Cars</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet" />
    <style>
      :root {
        --white: #ffffff;
        --bg: #f7f8fa;
        --surface: #ffffff;
        --ink: #1a1f2e;
        --muted: #5c6478;
        --border: #e4e7ee;
        --accent: #c8102e;
        --accent-dark: #a00d24;
        --navy: #0f1d3a;
        --navy-light: #1a2d52;
        --gold: #b8963e;
        --shadow: 0 4px 24px rgba(15, 29, 58, 0.08);
        --shadow-lg: 0 12px 48px rgba(15, 29, 58, 0.12);
        --radius: 12px;
        --radius-sm: 8px;
        --font: 'DM Sans', system-ui, sans-serif;
        --font-display: 'DM Serif Display', Georgia, serif;
      }

      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      html { scroll-behavior: smooth; }

      body {
        background: var(--bg);
        color: var(--ink);
        font-family: var(--font);
        line-height: 1.6;
        -webkit-font-smoothing: antialiased;
      }

      img { display: block; max-width: 100%; height: auto; }
      a { color: inherit; text-decoration: none; }
      button { font-family: inherit; cursor: pointer; border: none; background: none; }
      ul { list-style: none; }

      .container {
        width: min(1200px, 100% - 2.5rem);
        margin-inline: auto;
      }

      /* Header */
      .site-header {
        position: sticky;
        top: 0;
        z-index: 100;
        background: var(--white);
        border-bottom: 1px solid var(--border);
        box-shadow: 0 1px 0 rgba(0,0,0,0.04);
      }

      .header-top {
        background: var(--navy);
        color: rgba(255,255,255,0.85);
        font-size: 0.8rem;
        padding: 0.45rem 0;
      }

      .header-top .container {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 0.5rem;
      }

      .header-top a { color: #fff; }
      .header-top a:hover { text-decoration: underline; }

      .header-main .container {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding-block: 1rem;
        gap: 1.5rem;
      }

      .logo {
        display: flex;
        align-items: center;
        gap: 0.75rem;
      }

      .logo-mark {
        width: 44px;
        height: 44px;
        background: var(--navy);
        color: var(--white);
        border-radius: var(--radius-sm);
        display: grid;
        place-items: center;
        font-weight: 700;
        font-size: 0.75rem;
        letter-spacing: 0.04em;
      }

      .logo-text strong {
        display: block;
        font-size: 1.1rem;
        font-weight: 700;
        color: var(--navy);
        line-height: 1.2;
      }

      .logo-text span {
        font-size: 0.75rem;
        color: var(--muted);
      }

      .main-nav {
        display: flex;
        gap: 1.75rem;
      }

      .main-nav a {
        font-size: 0.9rem;
        font-weight: 500;
        color: var(--muted);
        transition: color 0.2s;
      }

      .main-nav a:hover { color: var(--navy); }

      .header-actions {
        display: flex;
        align-items: center;
        gap: 0.75rem;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.4rem;
        padding: 0.65rem 1.25rem;
        border-radius: var(--radius-sm);
        font-size: 0.9rem;
        font-weight: 600;
        transition: background 0.2s, color 0.2s, box-shadow 0.2s, transform 0.15s;
      }

      .btn:active { transform: scale(0.98); }

      .btn-primary {
        background: var(--accent);
        color: var(--white);
      }

      .btn-primary:hover { background: var(--accent-dark); }

      .btn-outline {
        border: 1.5px solid var(--border);
        color: var(--navy);
        background: var(--white);
      }

      .btn-outline:hover {
        border-color: var(--navy);
        background: var(--bg);
      }

      .btn-navy {
        background: var(--navy);
        color: var(--white);
      }

      .btn-navy:hover { background: var(--navy-light); }

      .btn-sm { padding: 0.5rem 1rem; font-size: 0.85rem; }

      .menu-toggle {
        display: none;
        width: 40px;
        height: 40px;
        border-radius: var(--radius-sm);
        border: 1px solid var(--border);
        align-items: center;
        justify-content: center;
        font-size: 1.25rem;
        color: var(--navy);
      }

      /* Hero */
      .hero {
        position: relative;
        min-height: 520px;
        display: flex;
        align-items: center;
        overflow: hidden;
        background: var(--navy);
      }

      .hero-bg {
        position: absolute;
        inset: 0;
        background:
          linear-gradient(105deg, rgba(15,29,58,0.92) 0%, rgba(15,29,58,0.65) 45%, rgba(15,29,58,0.3) 100%),
          url('https://images.unsplash.com/photo-1492144534655-ae79c964c9d7?w=1600&q=80') center/cover no-repeat;
      }

      .hero .container {
        position: relative;
        z-index: 1;
        display: grid;
        grid-template-columns: 1fr 380px;
        gap: 3rem;
        align-items: center;
        padding-block: 4rem;
      }

      .hero-content h1 {
        font-family: var(--font-display);
        font-size: clamp(2.25rem, 4vw, 3.25rem);
        font-weight: 400;
        color: var(--white);
        line-height: 1.15;
        margin-bottom: 1rem;
      }

      .hero-content h1 em {
        font-style: italic;
        color: #f0d78c;
      }

      .hero-content p {
        color: rgba(255,255,255,0.8);
        font-size: 1.05rem;
        max-width: 480px;
        margin-bottom: 1.75rem;
      }

      .hero-actions { display: flex; gap: 0.75rem; flex-wrap: wrap; }

      .hero-stats {
        display: flex;
        gap: 2rem;
        margin-top: 2.5rem;
        padding-top: 2rem;
        border-top: 1px solid rgba(255,255,255,0.15);
      }

      .hero-stat strong {
        display: block;
        font-size: 1.5rem;
        font-weight: 700;
        color: var(--white);
      }

      .hero-stat span {
        font-size: 0.8rem;
        color: rgba(255,255,255,0.6);
      }

      .search-card {
        background: var(--white);
        border-radius: var(--radius);
        padding: 1.75rem;
        box-shadow: var(--shadow-lg);
      }

      .search-card h2 {
        font-size: 1.15rem;
        font-weight: 700;
        color: var(--navy);
        margin-bottom: 1.25rem;
      }

      .form-group { margin-bottom: 1rem; }

      .form-group label {
        display: block;
        font-size: 0.8rem;
        font-weight: 600;
        color: var(--muted);
        margin-bottom: 0.35rem;
      }

      .form-input {
        width: 100%;
        padding: 0.65rem 0.85rem;
        border: 1.5px solid var(--border);
        border-radius: var(--radius-sm);
        font-size: 0.9rem;
        color: var(--ink);
        background: var(--white);
        transition: border-color 0.2s;
      }

      .form-input:focus {
        outline: none;
        border-color: var(--navy);
      }

      .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.75rem;
      }

      /* Sections */
      .section { padding: 5rem 0; }
      .section-alt { background: var(--white); }

      .section-header {
        text-align: center;
        max-width: 560px;
        margin: 0 auto 3rem;
      }

      .section-header .eyebrow {
        font-size: 0.75rem;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--accent);
        margin-bottom: 0.5rem;
      }

      .section-header h2 {
        font-family: var(--font-display);
        font-size: clamp(1.75rem, 3vw, 2.25rem);
        font-weight: 400;
        color: var(--navy);
        margin-bottom: 0.75rem;
      }

      .section-header p { color: var(--muted); }

      /* Trust bar */
      .trust-bar {
        background: var(--white);
        border-bottom: 1px solid var(--border);
        padding: 1.5rem 0;
      }

      .trust-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 1.5rem;
        text-align: center;
      }

      .trust-item strong {
        display: block;
        font-size: 1.25rem;
        font-weight: 700;
        color: var(--navy);
      }

      .trust-item span {
        font-size: 0.8rem;
        color: var(--muted);
      }

      /* Inventory */
      .filter-tabs {
        display: flex;
        justify-content: center;
        gap: 0.5rem;
        margin-bottom: 2rem;
        flex-wrap: wrap;
      }

      .filter-tab {
        padding: 0.5rem 1.1rem;
        border-radius: 999px;
        font-size: 0.85rem;
        font-weight: 600;
        color: var(--muted);
        border: 1.5px solid var(--border);
        background: var(--white);
        transition: all 0.2s;
      }

      .filter-tab:hover { border-color: var(--navy); color: var(--navy); }

      .filter-tab.active {
        background: var(--navy);
        color: var(--white);
        border-color: var(--navy);
      }

      .inventory-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 1.5rem;
      }

      .car-card {
        background: var(--white);
        border-radius: var(--radius);
        overflow: hidden;
        border: 1px solid var(--border);
        transition: box-shadow 0.25s, transform 0.25s;
      }

      .car-card:hover {
        box-shadow: var(--shadow-lg);
        transform: translateY(-3px);
      }

      .car-image {
        position: relative;
        aspect-ratio: 16/10;
        overflow: hidden;
        background: var(--bg);
      }

      .car-image img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.4s;
      }

      .car-card:hover .car-image img { transform: scale(1.04); }

      .car-badge {
        position: absolute;
        top: 0.75rem;
        left: 0.75rem;
        background: var(--accent);
        color: var(--white);
        font-size: 0.7rem;
        font-weight: 700;
        padding: 0.25rem 0.6rem;
        border-radius: 4px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }

      .car-badge.certified { background: var(--navy); }
      .car-badge.electric { background: #1a7f4b; }

      .car-body { padding: 1.25rem; }

      .car-body h3 {
        font-size: 1.05rem;
        font-weight: 700;
        color: var(--navy);
        margin-bottom: 0.25rem;
      }

      .car-trim {
        font-size: 0.85rem;
        color: var(--muted);
        margin-bottom: 0.75rem;
      }

      .car-specs {
        display: flex;
        gap: 1rem;
        font-size: 0.8rem;
        color: var(--muted);
        margin-bottom: 1rem;
        padding-bottom: 1rem;
        border-bottom: 1px solid var(--border);
      }

      .car-footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .car-price strong {
        font-size: 1.2rem;
        font-weight: 700;
        color: var(--navy);
      }

      .car-price span {
        display: block;
        font-size: 0.75rem;
        color: var(--muted);
      }

      /* Services */
      .services-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 1.5rem;
      }

      .service-card {
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 1.75rem 1.5rem;
        text-align: center;
        transition: background 0.2s, box-shadow 0.2s;
      }

      .service-card:hover {
        background: var(--white);
        box-shadow: var(--shadow);
      }

      .service-icon {
        width: 52px;
        height: 52px;
        margin: 0 auto 1rem;
        background: var(--white);
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        display: grid;
        place-items: center;
        font-size: 1.4rem;
      }

      .service-card h3 {
        font-size: 1rem;
        font-weight: 700;
        color: var(--navy);
        margin-bottom: 0.5rem;
      }

      .service-card p {
        font-size: 0.85rem;
        color: var(--muted);
        line-height: 1.5;
      }

      /* About */
      .about-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 4rem;
        align-items: center;
      }

      .about-image {
        border-radius: var(--radius);
        overflow: hidden;
        box-shadow: var(--shadow-lg);
      }

      .about-image img {
        width: 100%;
        aspect-ratio: 4/3;
        object-fit: cover;
      }

      .about-content .eyebrow {
        font-size: 0.75rem;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--accent);
        margin-bottom: 0.5rem;
      }

      .about-content h2 {
        font-family: var(--font-display);
        font-size: 2rem;
        font-weight: 400;
        color: var(--navy);
        margin-bottom: 1rem;
        line-height: 1.2;
      }

      .about-content p {
        color: var(--muted);
        margin-bottom: 1rem;
      }

      .about-features {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.75rem;
        margin: 1.5rem 0;
      }

      .about-feature {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        font-size: 0.9rem;
        font-weight: 500;
        color: var(--ink);
      }

      .about-feature::before {
        content: '✓';
        color: var(--accent);
        font-weight: 700;
      }

      /* Testimonials */
      .testimonials-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 1.5rem;
      }

      .testimonial-card {
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 1.75rem;
      }

      .testimonial-stars {
        color: var(--gold);
        font-size: 0.9rem;
        margin-bottom: 0.75rem;
        letter-spacing: 0.1em;
      }

      .testimonial-card blockquote {
        font-size: 0.95rem;
        color: var(--ink);
        line-height: 1.6;
        margin-bottom: 1.25rem;
      }

      .testimonial-author {
        display: flex;
        align-items: center;
        gap: 0.75rem;
      }

      .author-avatar {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: var(--navy);
        color: var(--white);
        display: grid;
        place-items: center;
        font-size: 0.8rem;
        font-weight: 700;
      }

      .author-info strong {
        display: block;
        font-size: 0.9rem;
        color: var(--navy);
      }

      .author-info span {
        font-size: 0.8rem;
        color: var(--muted);
      }

      /* CTA */
      .cta-section {
        background: var(--navy);
        color: var(--white);
        padding: 4rem 0;
      }

      .cta-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 3rem;
        align-items: center;
      }

      .cta-content h2 {
        font-family: var(--font-display);
        font-size: 2rem;
        font-weight: 400;
        margin-bottom: 0.75rem;
      }

      .cta-content p {
        color: rgba(255,255,255,0.75);
        margin-bottom: 1.5rem;
      }

      .cta-contact {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }

      .cta-contact a {
        color: rgba(255,255,255,0.9);
        font-size: 0.95rem;
      }

      .cta-contact a:hover { color: #fff; text-decoration: underline; }

      .contact-form {
        background: var(--white);
        border-radius: var(--radius);
        padding: 2rem;
      }

      .contact-form h3 {
        font-size: 1.1rem;
        font-weight: 700;
        color: var(--navy);
        margin-bottom: 1.25rem;
      }

      .form-success {
        background: #e8f5ee;
        color: #1a7f4b;
        padding: 0.75rem 1rem;
        border-radius: var(--radius-sm);
        font-size: 0.9rem;
        margin-bottom: 1rem;
      }

      /* Footer */
      .site-footer {
        background: #0a1228;
        color: rgba(255,255,255,0.7);
        padding: 3.5rem 0 1.5rem;
      }

      .footer-grid {
        display: grid;
        grid-template-columns: 2fr 1fr 1fr 1fr;
        gap: 2.5rem;
        margin-bottom: 2.5rem;
      }

      .footer-grid h4 {
        color: var(--white);
        font-size: 0.85rem;
        font-weight: 700;
        margin-bottom: 1rem;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }

      .footer-grid ul li { margin-bottom: 0.5rem; }
      .footer-grid a { font-size: 0.9rem; transition: color 0.2s; }
      .footer-grid a:hover { color: var(--white); }

      .footer-brand p {
        font-size: 0.9rem;
        line-height: 1.6;
        margin-top: 1rem;
        max-width: 280px;
      }

      .footer-bottom {
        border-top: 1px solid rgba(255,255,255,0.1);
        padding-top: 1.5rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 1rem;
        font-size: 0.8rem;
      }

      /* Mobile nav */
      .mobile-nav {
        display: none;
        flex-direction: column;
        padding: 1rem 1.25rem 1.25rem;
        border-top: 1px solid var(--border);
        background: var(--white);
      }

      .mobile-nav.open { display: flex; }

      .mobile-nav a {
        padding: 0.65rem 0;
        font-weight: 500;
        color: var(--muted);
        border-bottom: 1px solid var(--border);
      }

      .mobile-nav a:last-child { border-bottom: none; }

      /* Responsive */
      @media (max-width: 1024px) {
        .hero .container { grid-template-columns: 1fr; }
        .search-card { max-width: 480px; }
        .inventory-grid { grid-template-columns: repeat(2, 1fr); }
        .services-grid { grid-template-columns: repeat(2, 1fr); }
        .about-grid, .cta-grid { grid-template-columns: 1fr; }
        .footer-grid { grid-template-columns: 1fr 1fr; }
      }

      @media (max-width: 768px) {
        .main-nav, .header-actions .btn-outline { display: none; }
        .menu-toggle { display: flex; }
        .trust-grid { grid-template-columns: repeat(2, 1fr); }
        .inventory-grid, .testimonials-grid { grid-template-columns: 1fr; }
        .services-grid { grid-template-columns: 1fr; }
        .hero-stats { gap: 1.25rem; }
        .footer-grid { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <div id="root"><!--ssr-outlet--></div>
    <script type="module" src="/src/entry-client.jsx"></script>
  </body>
</html>
